<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <title>Contact Us</title>
    <link rel="stylesheet" href="index.css">
</head>

<body class="contact-page">
    <main id="main">
        <!-- Form section -->
        <section class="contact-form-section">
            <div>
                <header>
                    <h1 class="contact-form-heading">Reach <span>Out</span></h1>
                    <p class="contact-form-intro">Curious about something? Complete these fields and "get in touch", as
                        you
                        humans say.
                        🤙</p>
                </header>
                <form id="contact-form" onsubmit="submitForm(event)">
                    <div class="form-group">
                        <label for="name">Full name</label>
                        <input class="contact-input" name="full name" id="name" type="text"
                            placeholder="Daniel Radcliffe" autocomplete="name" required aria-required="true" />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input class="contact-input" name="email" id="email" type="email" required aria-required="true"
                            autocomplete="email" placeholder="da.real.harry@gmail.com" />
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea aria-describedby="message-help" class="contact-textarea" id="message" rows="4"
                            cols="50" placeholder="Your message..."></textarea>
                        <p id="message-help" aria-live="polite">Max 500 characters</p>
                    </div>
                    <button class="contact-submit-button" type="submit" onclick="submitForm()">Send message <span
                            aria-hidden="true">🎉</span>
                    </button>
                </form>
            </div>
            <figure>
                <img class="contact-image" src="./images/connect.png"
                    alt="A robot hand and a human reaching for each other." />
            </figure>
        </section>
    </main>
</body>

</html>
